{{ define "main" }}
<div class="posts-list">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <article>
        <h2 class="post-title">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h2>
        {{ with .Date }}
        <div class="post-date">{{ .Format "January 2, 2006" }}</div>
        {{ end }}
        {{ with .Summary }}
        <div class="post-content">
            {{ . }}
        </div>
        {{ end }}
    </article>
    {{ end }}
</div>
{{ end }}
