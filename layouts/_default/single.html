{{ define "main" }}
<style>
    .post-content img {
        max-width: 100%;
        height: auto;
        cursor: pointer;
    }
</style>

<article>
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-date">{{ .Date.Format "Jan 2, 2006" }} ✨</div>
    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
