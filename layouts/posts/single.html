{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "January 2, 2006" }}</time>
    <div class="post-content">
        {{ $content := .Content }}
        {{ $content := replaceRE `<img src="([^"]+)"` (printf `<img src="$1" loading="lazy"`) $content }}
        {{ $content := replaceRE `src="(/[^"]+\.(jpg|jpeg|png|gif))"` (printf `src="{{ with $.Resources.GetMatch "$1" }}{{ (.Resize "1000x").RelPermalink }}{{ else }}$1{{ end }}"`) $content }}
        {{ $content | safeHTML }}
    </div>
</article>

<style>
article {
    max-width: 800px;
    margin-left: 40px;
    padding: 20px;
    text-align: left;
}

h1 {
    text-align: left;
    margin-bottom: 10px;
}

time {
    display: block;
    color: #666;
    margin: 10px 0 30px;
    text-align: left;
}

.post-content {
    margin: 0;
    padding: 0;
    text-align: left;
}

.post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 20px 0;
}
</style>
{{ end }}
