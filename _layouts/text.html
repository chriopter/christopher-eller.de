---
layout: default
---

<div class="posts-list">
    {% for post in site.posts %}
        {% if post.path contains '_posts/text/' %}
        <article class="post">
            <div class="post-title">
                <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
                <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            </div>
        </article>
        {% endif %}
    {% endfor %}
</div>
