---
layout: default
---

<div class="posts-list">
    {% for post in site.posts %}
    <article class="post">
        <h2 class="post-title">{{ post.title }}</h2>
        <div class="post-date">{{ post.date | date: "%b %-d, %Y" }} ✨</div>
        <div class="post-content">
            {{ post.content }}
        </div>
    </article>
    {% endfor %}
</div>
