---
layout: default
---

<style>
/* Force dark mode styles regardless of theme */
body {
    background-color: #111 !important;
    color: #eee !important;
}

header {
    border-bottom-color: #333 !important;
}

.site-title,
.nav-links a {
    color: #eee !important;
}

footer {
    border-top-color: #333 !important;
}

footer a {
    color: #999 !important;
}

/* Override default layout constraints */
main {
    max-width: none !important;
    padding: 0 !important;
}

.photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
    gap: 16px;
    padding: 16px;
    width: 100%;
    margin: 0;
    background-color: #000000;
    align-items: start;
}

.photo-item {
    position: relative;
    overflow: hidden;
    display: block;
    aspect-ratio: 3/2;
}

.photo-item img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    transition: transform 0.3s ease, object-fit 0.3s ease;
}

.photo-item:hover img {
    transform: scale(1.03);
    object-fit: contain;
    background-color: #000;
}

.photo-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 25%;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
    color: white;
    padding: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.photo-item:hover .photo-info {
    opacity: 1;
    transform: translateY(0);
}

.photo-info .title {
    font-size: 16px;
    margin-bottom: 4px;
}

.photo-info .date {
    font-size: 14px;
    opacity: 0.8;
}

.photo-info .exif-info {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.7;
}

.photo-info .camera {
    margin-bottom: 2px;
}

.photo-info .location {
    color: #fff;
    text-decoration: underline;
    opacity: 0.9;
}

.photo-info .location:hover {
    opacity: 1;
}
</style>

<div class="photo-grid">
    {% for post in site.posts %}
        {% if post.path contains '_posts/photos/' %}
            {% assign content = post.content %}
            {% assign img_tag = content | split: '<img src="' | last | split: '"' | first %}
            {% assign path_parts = img_tag | split: '/' %}
            {% assign filename = path_parts | last %}
            {% assign thumbnail_path = '/assets/images/photos/thumbnails/' | append: filename | replace: '.heic', '.jpeg' %}
            {% assign full_img = img_tag %}
            {% assign img_path = '/assets/images/photos/' | append: filename %}
            {% assign system_path = img_path | prepend: site.source %}
            <a href="{{ site.url }}{{ full_img }}" class="photo-item">
                <img src="{{ site.url }}{{ site.baseurl }}/assets/images/blank.png" data-echo="{{ site.url }}{{ site.baseurl }}{{ thumbnail_path }}" />
                <div class="photo-info">
                    <div class="title">{{ post.title }}</div>
                    <div class="date">{{ post.date | date: "%B %d, %Y" }}</div>
                </div>
            </a>
        {% endif %}
    {% endfor %}
</div>

<script>
// No JavaScript needed - pure CSS masonry grid
</script>
