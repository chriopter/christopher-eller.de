<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glass Photos</title>
    <script>
        // Get theme from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const theme = urlParams.get('theme') || 'light';
        
        // Redirect to glass.photo with theme
        window.location.href = `https://glass.photo/christopher.photo?theme=${theme}`;
    </script>
</head>
<body>
    <p>Redirecting to Glass...</p>
</body>
</html>
