---
layout: default
---

<style>
    .post-content img {
        max-width: 100%;
        height: auto;
        cursor: pointer;
    }
    
    .photo-metadata {
        margin-top: 20px;
        padding: 15px;
        background: #f8f8f8;
        border-radius: 5px;
        font-size: 14px;
        color: #666;
    }

    .photo-metadata h3 {
        margin-top: 0;
        margin-bottom: 10px;
        color: #333;
        font-size: 16px;
    }

    .photo-metadata p {
        margin: 5px 0;
    }

    @media (prefers-color-scheme: dark) {
        .photo-metadata {
            background: #222;
            color: #999;
        }
        
        .photo-metadata h3 {
            color: #ccc;
        }
    }
</style>


<article>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-date">{{ page.date | date: "%b %-d, %Y" }} ✨</div>
    <div class="post-content">
        {{ content }}
    </div>
</article>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const images = document.querySelectorAll('.post-content img');
        images.forEach(function(img) {
            const link = document.createElement('a');
            link.href = img.src;
            link.target = '_blank';
            img.parentNode.insertBefore(link, img);
            link.appendChild(img);
        });
    });
</script>
