<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        /* Base styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #111;
            -webkit-font-smoothing: antialiased;
        }

        /* Header styles */
        header {
            padding: 1.5rem 2rem 1rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 1rem;
        }

        .header-content {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
            color: #000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
        }

        /* Main content */
        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Post styles */
        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #000;
            text-decoration: none;
        }

        .post-date {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* Posts list */
        .posts-list {
            padding: 0;
        }

        .posts-list article {
            margin-bottom: 4rem;
            padding-bottom: 4rem;
            border-bottom: 1px solid #eee;
        }

        .posts-list article:last-child {
            border-bottom: none;
        }

        .posts-list .post-title {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: #000;
        }

        .posts-list .post-date {
            margin: 0.75rem 0 2rem;
            color: #757575;
            font-size: 0.95rem;
        }

        .posts-list .post-content {
            font-size: 1.05rem;
            line-height: 1.75;
            color: #222;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/" class="site-title">
                Christopher Eller
                <span>🌕</span>
            </a>
            <nav class="nav-links">
                <a href="/about">About</a>
                <a href="/subscribe">Subscribe</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>
</body>
</html>
