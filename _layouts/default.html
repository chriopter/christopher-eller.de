<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <style>
        /* Dark mode styles */
        body.dark-mode {
            background-color: #111;
            color: #eee;
        }

        body.dark-mode .header-content {
            border-bottom-color: #333;
        }

        body.dark-mode .site-title,
        body.dark-mode .nav-links a {
            color: #eee;
        }

        body.dark-mode .posts-list article {
            border-bottom-color: #333;
        }

        body.dark-mode .post-title,
        body.dark-mode .post-content {
            color: #eee;
        }

        /* Moon toggle styles */
        .moon-toggle {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .moon-toggle:hover {
            transform: scale(1.1);
        }

        .moon-toggle.transitioning {
            opacity: 0.8;
        }

        /* Base styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #111;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Header styles */
        header {
            padding: 2rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 2rem;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-title {
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
            color: #000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-size: 1rem;
            padding: 0.25rem 0;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #666;
        }

        /* Main content */
        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Post styles */
        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #000;
            text-decoration: none;
        }

        .post-date {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.7;
        }

        /* Posts list */
        .posts-list {
            padding: 0;
        }

        .posts-list article {
            margin-bottom: 4rem;
            padding-bottom: 4rem;
            border-bottom: 1px solid #eee;
        }

        .posts-list article:last-child {
            border-bottom: none;
        }

        .posts-list .post-title {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: #000;
        }

        .posts-list .post-date {
            margin: 0.75rem 0 2rem;
            color: #757575;
            font-size: 0.95rem;
        }

        .posts-list .post-content {
            font-size: 1.05rem;
            line-height: 1.75;
            color: #222;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="site-title">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: inherit;">Christopher Eller</a>
                <span class="moon-toggle" id="moonToggle" style="pointer-events: auto;">🌕</span>
            </div>
            <nav class="nav-links">
                <a href="{{ site.baseurl }}/photos">Photos</a>
                <a href="{{ site.baseurl }}/links">Links</a>
                <a href="{{ site.baseurl }}/projects">Projects</a>
                <a href="{{ site.baseurl }}/text">Text</a>
                <a href="{{ site.baseurl }}/about">About</a>
                <a href="{{ site.baseurl }}/subscribe">Subscribe</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <script>
        const moonToggle = document.getElementById('moonToggle');
        const body = document.body;
        const toDarkPhases = ['🌔', '🌓', '🌒'];
        const toLightPhases = ['🌘', '🌗', '🌖'];
        let currentIndex = 0;
        let isTransitioning = false;
        let transitionInterval;

        // Check for saved preference
        const darkMode = localStorage.getItem('darkMode') === 'true';
        if (darkMode) {
            body.classList.add('dark-mode');
            moonToggle.textContent = '🌑';
        }

        function animatePhases(phases, isDarkMode) {
            if (isTransitioning) return;
            isTransitioning = true;
            currentIndex = 0;

            // Apply mode change immediately
            if (isDarkMode) {
                body.classList.add('dark-mode');
            } else {
                body.classList.remove('dark-mode');
            }
            localStorage.setItem('darkMode', isDarkMode);

            function transition() {
                moonToggle.textContent = phases[currentIndex];
                moonToggle.classList.add('transitioning');
                currentIndex++;

                if (currentIndex >= phases.length) {
                    clearInterval(transitionInterval);
                    isTransitioning = false;
                    moonToggle.classList.remove('transitioning');
                    moonToggle.textContent = isDarkMode ? '🌑' : '🌕';
                }
            }

            transitionInterval = setInterval(transition, 150);
        }

        moonToggle.addEventListener('click', () => {
            const toDarkMode = !body.classList.contains('dark-mode');
            animatePhases(toDarkMode ? toDarkPhases : toLightPhases, toDarkMode);
        });
    </script>
    {% include lazyload.html %}
</body>
</html>
