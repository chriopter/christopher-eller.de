---
layout: default
---

<div class="posts-list">
    {% for post in site.posts %}
        {% if post.path contains '_posts/links/' %}
        <div class="post-content">
            <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span> {{ post.content }}
        </div>
        {% endif %}
    {% endfor %}
</div>
