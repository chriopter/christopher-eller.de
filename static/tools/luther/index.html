<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luther's Flight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        canvas {
            border: 1px solid black;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        #score {
            font-size: clamp(18px, 5vw, 24px);
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        // Sound effects (short beep sounds)
        const jumpSound = new Audio("data:audio/wav;base64,UklGRnQGAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YU8GAAAAAGsBmwL3AyEEQARHBDEEEATgA6EDVQMBAwEC0gKpAoICXQI7AhwC/wHlAdABvQGrAZwBjwGDAXkBcQFqAWQBXwFaAVYBUwFRAVABTwFPAVABUQFTAVYBWQFdAWIBZwFtAXMBegGBAYkBkgGbAaUBrwG6AcUB0QHdAekB9gEDAhECHwItAjsCSwJaAmoCewKMAp4CsALCAhYD");
        const scoreSound = new Audio("data:audio/wav;base64,UklGRpIGAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YW0GAAAAAFcBhwLvAxwEPwRHBDMEFQTmA6kDXQMKAwkC2gKyAosCZwJFAiYCCQLvAdoBxwG1AaMBlQGIAX0BcwFrAWQBXgFZAVUBUgFQAU8BTgFOAU8BUAFSAVUBWAFcAWEBZgFsAXIBeQGAAYgBkQGaAaMBrQG4AcMBzwHbAecB9AEBAg8CHQIrAjkCSQJYAmgCeQKKApwCrgLAAgQD");
        const gameOverSound = new Audio("data:audio/wav;base64,UklGRoYGAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YWEGAAAAAEMBdQLlAxMEOARHBDUEGQTrA64DYgMPAxAC4QK6ApQCcAJOAi8CEwL5AeQB0QG+AawBngGRAYYBfAF0AW0BZwFhAV0BWgFYAVYBVQFVAVYBVwFZAVwBXwFjAWgBbQFzAXkBgAGIAZABmQGiAawBtwHCAc4B2gHmAfIB/wENAhsCKQI3AkcCVgJmAncCiAKaAqwCvgL4Ag==");
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        // Game variables
        let score = 0;
        let bird;
        let pipeWidth;
        let pipeGap;
        let pipeSpacing;
        let spireHeight;
        const pipes = [];
        
        // Set canvas size and initialize game parameters
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 500); // Max width of 500px
            canvas.width = maxWidth;
            canvas.height = Math.floor(maxWidth * 1.5); // Keep 2:3 ratio
            
            // Update game parameters based on canvas size
            const birdSize = Math.floor(canvas.width * 0.0625); // 20px at 320px width
            const birdX = Math.floor(canvas.width * 0.15625); // 50px at 320px width
            
            // Initialize or update bird
            if (!bird) {
                bird = {
                    x: birdX,
                    y: canvas.height / 2,
                    velocity: 0,
                    gravity: canvas.height * 0.001,
                    jump: canvas.height * -0.0167,
                    size: birdSize
                };
            } else {
                bird.x = birdX;
                bird.size = birdSize;
                bird.gravity = canvas.height * 0.001;
                bird.jump = canvas.height * -0.0167;
                if (!gameStarted) {
                    bird.y = canvas.height / 2;
                }
            }
            
            // Update pipe dimensions
            pipeWidth = Math.floor(canvas.width * 0.15625);
            pipeGap = Math.floor(canvas.height * 0.3125);
            pipeSpacing = Math.floor(canvas.width * 0.625);
            spireHeight = Math.floor(canvas.height * 0.0625);
        }
        
        // Initial resize and add listener
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        let frameCount = 0;

        // Game state
        let isGameOver = false;
        let gameStarted = false;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!gameStarted) {
                    gameStarted = true;
                }
                if (!isGameOver) {
                    bird.velocity = bird.jump;
                    jumpSound.play();
                } else {
                    resetGame();
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameStarted) {
                gameStarted = true;
            }
            if (!isGameOver) {
                bird.velocity = bird.jump;
                jumpSound.play();
            } else {
                resetGame();
            }
        });

        function createPipe() {
            const minHeight = Math.floor(canvas.height * 0.1); // 50px at 480px height
            const maxHeight = canvas.height - pipeGap - minHeight;
            const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            
            pipes.push({
                x: canvas.width,
                height: height,
                scored: false
            });
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes.length = 0;
            score = 0;
            isGameOver = false;
            gameStarted = false;
            scoreElement.textContent = 'Score: 0';
        }

        function update() {
            if (!gameStarted) {
                ctx.fillStyle = '#000';
                ctx.font = `${Math.floor(canvas.width * 0.05)}px Arial`;
                const text = 'Click or press Space to start';
                ctx.textAlign = 'center';
                ctx.fillText(text, canvas.width / 2, canvas.height / 2);
                requestAnimationFrame(update);
                return;
            }

            if (!isGameOver) {
                // Update bird
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                // Create new pipes
                frameCount++;
                if (frameCount % pipeSpacing === 0) {
                    createPipe();
                }

                // Update pipes
                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= Math.floor(canvas.width * 0.00625); // 2px at 320px width

                    // Remove off-screen pipes
                    if (pipes[i].x + pipeWidth < 0) {
                        pipes.splice(i, 1);
                        continue;
                    }

                    // Score points
                    if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
                        score++;
                        pipes[i].scored = true;
                        scoreElement.textContent = `Score: ${score}`;
                        scoreSound.play();
                    }

                    // Check collisions
                    if (bird.x + bird.size > pipes[i].x && 
                        bird.x < pipes[i].x + pipeWidth && 
                        (bird.y < pipes[i].height || 
                         bird.y + bird.size > pipes[i].height + pipeGap)) {
                        isGameOver = true;
                        gameOverSound.play();
                    }
                }

                // Check boundaries
                if (bird.y + bird.size > canvas.height || bird.y < 0) {
                    isGameOver = true;
                    gameOverSound.play();
                }
            }

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Martin Luther
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            // Black robe
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(bird.size/2, bird.size/2, bird.size/2, bird.size/2 + 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Face
            ctx.fillStyle = '#FFE4C4';
            ctx.beginPath();
            ctx.arc(bird.size/2, bird.size/2 - 2, bird.size/3, 0, Math.PI * 2);
            ctx.fill();

            // Hat
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.rect(0, 0, bird.size, bird.size/3);
            ctx.fill();
            ctx.beginPath();
            ctx.rect(bird.size/4, 0, bird.size/2, -bird.size/4);
            ctx.fill();

            // Beard
            ctx.fillStyle = '#4A3728';
            ctx.beginPath();
            ctx.ellipse(bird.size/2, bird.size/2 + 2, bird.size/4, bird.size/6, 0, 0, Math.PI);
            ctx.fill();

            ctx.restore();

            // Draw church towers
            pipes.forEach(pipe => {
                // Top tower
                ctx.fillStyle = '#8B4513'; // Brown base
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.height);
                
                // Spire for top tower
                ctx.beginPath();
                ctx.moveTo(pipe.x, pipe.height);
                ctx.lineTo(pipe.x + pipeWidth/2, pipe.height - spireHeight);
                ctx.lineTo(pipe.x + pipeWidth, pipe.height);
                ctx.fillStyle = '#4A2511';
                ctx.fill();
                
                // Windows for top tower
                ctx.fillStyle = '#FFD700'; // Gold windows
                const windowHeight = Math.floor(canvas.height * 0.04);
                const windowWidth = Math.floor(canvas.width * 0.03);
                const windowSpacing = Math.floor(canvas.height * 0.08);
                for(let y = windowSpacing; y < pipe.height - windowSpacing; y += windowSpacing) {
                    // Arch window
                    ctx.beginPath();
                    ctx.rect(pipe.x + (pipeWidth - windowWidth)/2, y, windowWidth, windowHeight);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(pipe.x + pipeWidth/2, y + windowHeight, windowWidth/2, 0, Math.PI, false);
                    ctx.fill();
                }

                // Bottom tower
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(
                    pipe.x,
                    pipe.height + pipeGap,
                    pipeWidth,
                    canvas.height - pipe.height - pipeGap
                );
                
                // Spire for bottom tower (inverted)
                ctx.beginPath();
                ctx.moveTo(pipe.x, pipe.height + pipeGap);
                ctx.lineTo(pipe.x + pipeWidth/2, pipe.height + pipeGap + spireHeight);
                ctx.lineTo(pipe.x + pipeWidth, pipe.height + pipeGap);
                ctx.fillStyle = '#4A2511';
                ctx.fill();
                
                // Windows for bottom tower
                ctx.fillStyle = '#FFD700';
                for(let y = pipe.height + pipeGap + windowSpacing; y < canvas.height - windowSpacing; y += windowSpacing) {
                    // Arch window
                    ctx.beginPath();
                    ctx.rect(pipe.x + (pipeWidth - windowWidth)/2, y, windowWidth, windowHeight);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(pipe.x + pipeWidth/2, y + windowHeight, windowWidth/2, 0, Math.PI, false);
                    ctx.fill();
                }
            });

            if (isGameOver) {
                ctx.fillStyle = '#000';
                ctx.font = `${Math.floor(canvas.width * 0.05)}px Arial`;
                const text = 'Game Over! Click or press Space to restart';
                ctx.textAlign = 'center';
                ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
