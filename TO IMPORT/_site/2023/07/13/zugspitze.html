<!DOCTYPE html>

    <meta charset="utf-8">
    <script>
        // Apply theme immediately
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const storedTheme = localStorage.getItem('darkMode');
        const shouldBeDark = storedTheme === 'true' || (storedTheme === null && prefersDark);
        
        // Apply theme to document
        if (shouldBeDark) {
            document.documentElement.classList.add('dark-mode');
        }
        
        // Set initial moon state
        document.documentElement.dataset.moonState = shouldBeDark ? '🌑' : '🌕';
    </script>

        /* Theme variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #111;
            --border-color: #eee;
            --link-color: #5a3d85;
            --link-hover-color: #7b52b5;
            --secondary-text: #666;
        }

        .dark-mode {
            --bg-color: #111;
            --text-color: #eee;
            --border-color: #333;
            --link-color: #b794f4;
            --link-hover-color: #d6bcfa;
            --secondary-text: #999;
        }

        /* Moon toggle styles */
        .moon-toggle {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .moon-toggle:hover {
            transform: scale(1.1);
        }

        .moon-toggle.transitioning {
            opacity: 0.8;
        }

        /* Base styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: var(--bg-color);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Header styles */
        header {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        header .header-content {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 2rem;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 600px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .nav-links {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 1rem;
            }
        }

        @media (max-width: 300px) {
            .nav-links {
                justify-content: flex-start;
            }

            .nav-links a {
                width: calc(50% - 1rem);
                text-align: left;
            }
        }

        .site-title {
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1rem;
            padding: 0.25rem 0;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--secondary-text);
        }

        /* Main content */
        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Post styles */
        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            text-decoration: none;
        }

        .post-date {

            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-color);
        }

        /* Posts list */
        .posts-list {
            padding: 0;
        }

        .posts-list article {
            margin-bottom: 4rem;
            padding-bottom: 4rem;
            border-bottom: 1px solid var(--border-color);
        }

        .posts-list article:last-child {

        }

        .posts-list .post-title {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .posts-list .post-title a {

        .posts-list .post-title a:hover {

        .posts-list .post-date {

        }

        .posts-list .post-content {
            font-size: 1.05rem;
            line-height: 1.75;
            color: var(--text-color);
        }
    </style>

    <script>
        const moonToggle = document.getElementById('moonToggle');
        const body = document.body;
        const html = document.documentElement;
        const themeColor = document.getElementById('theme-color');
        const toDarkPhases = ['🌔', '🌓', '🌒'];
        const toLightPhases = ['🌘', '🌗', '🌖'];
        let currentIndex = 0;
        let isTransitioning = false;
        let transitionInterval;

        // System dark mode detection
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        // Function to update theme
        function updateTheme(isDark, skipStorage = false) {
            // If skipping storage and no manual preference, use system preference
            if (skipStorage && localStorage.getItem('darkMode') === null) {
                isDark = darkModeMediaQuery.matches;
            }
            if (isDark) {
                html.classList.add('dark-mode');
                body.classList.add('dark-mode');
                themeColor.content = '#111111';
                if (!isTransitioning) moonToggle.textContent = '🌑';
            } else {
                html.classList.remove('dark-mode');
                body.classList.remove('dark-mode');
                themeColor.content = '#ffffff';
                if (!isTransitioning) moonToggle.textContent = '🌕';
            }
            
            // Store manual preference if not skipping storage
            if (!skipStorage) {
                localStorage.setItem('darkMode', isDark.toString());
            }

            // Update iframe if it exists
            const photoFrame = document.querySelector('.iframe-container iframe');
            if (photoFrame) {
                photoFrame.contentWindow.postMessage({
                    type: 'theme',
                    theme: isDark ? 'dark' : 'light'
                }, '*');
            }
        }

        // Function to handle system preference changes
        function handleSystemPreference(e) {
            // Always clear stored preference and follow system
            localStorage.removeItem('darkMode');
            updateTheme(e.matches, true);
        }

        // Initial theme setup
        const storedPreference = localStorage.getItem('darkMode');
        if (storedPreference !== null) {
            updateTheme(storedPreference === 'true', true);
        } else {
            updateTheme(darkModeMediaQuery.matches, true);
        }

        // Listen for system theme changes
        darkModeMediaQuery.addEventListener('change', handleSystemPreference);

        // Double click to reset to system preference
        moonToggle.addEventListener('dblclick', (e) => {
            e.preventDefault();
            localStorage.removeItem('darkMode');
            updateTheme(darkModeMediaQuery.matches, true);
        });

        function animatePhases(phases, isDarkMode) {
            if (isTransitioning) return;
            isTransitioning = true;
            currentIndex = 0;

            // Apply theme change
            updateTheme(isDarkMode);

            function transition() {
                moonToggle.textContent = phases[currentIndex];
                moonToggle.classList.add('transitioning');
                currentIndex++;

                if (currentIndex >= phases.length) {
                    clearInterval(transitionInterval);
                    isTransitioning = false;
                    moonToggle.classList.remove('transitioning');
                    moonToggle.textContent = isDarkMode ? '🌑' : '🌕';
                }
            }

            transitionInterval = setInterval(transition, 150);
        }

        moonToggle.addEventListener('click', () => {
            const toDarkMode = !html.classList.contains('dark-mode');
            animatePhases(toDarkMode ? toDarkPhases : toLightPhases, toDarkMode);
        });
    </script>
    <script>
(function (root, factory) {
    if (typeof define === 'function' && define.amd) {
      define(function() {
        return factory(root);
      });
    } else if (typeof exports === 'object') {
      module.exports = factory;
    } else {
      root.echo = factory(root);
    }
  })(this, function (root) {
  
    'use strict';
  
    var echo = {};
  
    var callback = function () {};
  
    var offset, poll, delay, useDebounce, unload;
  
    var isHidden = function (element) {
      return (element.offsetParent === null);
    };
    
    var inView = function (element, view) {
      if (isHidden(element)) {
        return false;
      }
  
      var box = element.getBoundingClientRect();
      return (box.right >= view.l && box.bottom >= view.t && box.left <= view.r && box.top <= view.b);
    };
  
    var debounceOrThrottle = function () {
      if(!useDebounce && !!poll) {
        return;
      }
      clearTimeout(poll);
      poll = setTimeout(function(){
        echo.render();
        poll = null;
      }, delay);
    };
  
    echo.init = function (opts) {
      opts = opts || {};
      var offsetAll = opts.offset || 0;
      var offsetVertical = opts.offsetVertical || offsetAll;
      var offsetHorizontal = opts.offsetHorizontal || offsetAll;
      var optionToInt = function (opt, fallback) {
        return parseInt(opt || fallback, 10);
      };
      offset = {
        t: optionToInt(opts.offsetTop, offsetVertical),
        b: optionToInt(opts.offsetBottom, offsetVertical),
        l: optionToInt(opts.offsetLeft, offsetHorizontal),
        r: optionToInt(opts.offsetRight, offsetHorizontal)
      };
      delay = optionToInt(opts.throttle, 250);
      useDebounce = opts.debounce !== false;
      unload = !!opts.unload;
      callback = opts.callback || callback;
      echo.render();
      if (document.addEventListener) {
        root.addEventListener('scroll', debounceOrThrottle, false);
        root.addEventListener('load', debounceOrThrottle, false);
      } else {
        root.attachEvent('onscroll', debounceOrThrottle);
        root.attachEvent('onload', debounceOrThrottle);
      }
    };
  
    echo.render = function (context) {
      var nodes = (context || document).querySelectorAll('[data-echo], [data-echo-background]');
      var length = nodes.length;
      var src, elem;
      var view = {
        l: 0 - offset.l,
        t: 0 - offset.t,
        b: (root.innerHeight || document.documentElement.clientHeight) + offset.b,
        r: (root.innerWidth || document.documentElement.clientWidth) + offset.r
      };
      for (var i = 0; i < length; i++) {
        elem = nodes[i];
        if (inView(elem, view)) {
  
          if (unload) {
            elem.setAttribute('data-echo-placeholder', elem.src);
          }
  
          if (elem.getAttribute('data-echo-background') !== null) {
            elem.style.backgroundImage = 'url(' + elem.getAttribute('data-echo-background') + ')';
          }
          else if (elem.src !== (src = elem.getAttribute('data-echo'))) {
            elem.src = src;
          }
  
          if (!unload) {
            elem.removeAttribute('data-echo');
            elem.removeAttribute('data-echo-background');
          }
  
          callback(elem, 'load');
        }
        else if (unload && !!(src = elem.getAttribute('data-echo-placeholder'))) {
  
          if (elem.getAttribute('data-echo-background') !== null) {
            elem.style.backgroundImage = 'url(' + src + ')';
          }
          else {
            elem.src = src;
          }
  
          elem.removeAttribute('data-echo-placeholder');
          callback(elem, 'unload');
        }
      }
      if (!length) {
        echo.detach();
      }
    };
  
    echo.detach = function () {
      if (document.removeEventListener) {
        root.removeEventListener('scroll', debounceOrThrottle);
      } else {
        root.detachEvent('onscroll', debounceOrThrottle);
      }
      clearTimeout(poll);
    };
  
    return echo;
  
  });
</script>
