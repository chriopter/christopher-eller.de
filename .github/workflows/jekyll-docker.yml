name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# GitHub Pages deployment requires these permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache Bundler and Build
        uses: actions/cache@v3
        with:
          path: |
            vendor/bundle
            .jekyll-cache
            _site/assets/images/photos/thumbnails
          key: ${{ runner.os }}-jekyll-${{ hashFiles('**/Gemfile.lock', 'assets/images/photos/**') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Build in Jekyll Docker (with ImageMagick)
        run: |
          docker pull jekyll/builder:4.2.2
          docker run --rm \
            -v ${{ github.workspace }}:/srv/jekyll \
            -v ${{ github.workspace }}/vendor/bundle:/usr/local/bundle \
            -w /srv/jekyll \
            jekyll/builder:4.2.2 \
            /bin/bash -c "
              apk add --no-cache imagemagick &&
              chmod -R 777 /srv/jekyll &&
              jekyll build --future
            "

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
