name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          # Automatically sets up caching for gems in vendor/bundle
          bundler-cache: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      # Cache the Jekyll ".jekyll-cache" folder
      - name: Cache Jekyll
        uses: actions/cache@v3
        with:
          path: .jekyll-cache
          # Include files that would invalidate the cache if changed.
          key: ${{ runner.os }}-jekyll-${{ hashFiles('Gemfile.lock', '**/*.yml', '**/*.md', '**/*.html') }}
          restore-keys: ${{ runner.os }}-jekyll-

      - name: Install Ruby Dependencies
        run: |
          # Example: Installing an extra gem here
          bundle add faraday-retry
          bundle install

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4