name: Jekyll site CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Bundler
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Cache Jekyll Build
        uses: actions/cache@v3
        with:
          path: |
            .jekyll-cache
            _site
          key: ${{ runner.os }}-jekyll-${{ hashFiles('assets/images/photos/**', '_posts/**', '_layouts/**', '_includes/**') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Normalize Gemfile.lock Platforms
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/srv/jekyll \
            -w /srv/jekyll \
            jekyll/builder:latest \
            /bin/bash -c "
              chmod -R 777 /srv/jekyll &&
              bundle lock --add-platform x86_64-linux-musl --add-platform ruby --remove-platform x86_64-linux
            "

      - name: Commit Updated Gemfile.lock
        run: |
          git add Gemfile.lock
          git diff --staged --quiet || git commit -m "Update Gemfile.lock platform dependencies"
          git push

      - name: Build in Jekyll Docker (with ImageMagick)
        run: |
          docker pull jekyll/builder:latest
          docker run --rm \
            -v ${{ github.workspace }}:/srv/jekyll \
            -v ${{ github.workspace }}/vendor/bundle:/usr/local/bundle \
            -w /srv/jekyll \
            -e JEKYLL_ENV=production \
            -e PARALLEL_PROCESSOR_COUNT=4 \
            jekyll/builder:latest \
            /bin/bash -c "
              apk add --no-cache imagemagick parallel &&
              chmod -R 777 /srv/jekyll &&
              bundle config set --local path 'vendor/bundle' &&
              bundle config set --local deployment 'true' &&
              bundle install --jobs=4 --retry=3 &&
              jekyll build --future --trace --profile
            "

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
